# PilotRails CI — 설계: docs/02 §6, docs/05 보류 항목 승격.
# 로컬 Agent hooks(Preview)에만 의존하던 거버넌스 강제를 push·PR마다 원격에서
# 기계적으로 재현한다. harness-doctor(거버넌스 정합)·hook 단위 테스트(가드 순수
# 로직)·스모크(검증 앱 회귀)를 한 잡으로 묶어, hooks 미설정 협업자나 Preview
# 비활성 환경에서도 드리프트를 차단한다.
name: pilotrails-ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: pilotrails-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: |
            sandbox/*/package-lock.json

      - name: Governance check (harness-doctor)
        run: node scripts/harness-doctor.mjs

      - name: Hook unit tests
        run: node --test tests/*.test.mjs

      - name: Install sandbox app deps
        run: |
          for d in sandbox/*/; do
            if [ -f "${d}package-lock.json" ]; then
              (cd "$d" && npm ci --no-audit --no-fund)
            elif [ -f "${d}package.json" ]; then
              (cd "$d" && npm install --no-audit --no-fund)
            fi
          done

      - name: Smoke (sandbox apps)
        run: node scripts/smoke.mjs
